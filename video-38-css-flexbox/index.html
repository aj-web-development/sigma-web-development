<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flexbox</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        border: 2px solid red;
        height: 80vh;
        display: flex;
        /* justify-content: center; */
        align-items: center;
        /* flex-direction: row-reverse; */
        /* flex-wrap: wrap; */
        align-content: center;
        /* flex-flow: row wrap; */
        /* gap: 25px; */
        /* row-gap: 15px;
        column-gap: 25px; */
        gap: 15px 25px;
      }

      .item {
        height: 32px;
        width: 32px;
        border: 2px solid black;
        /* margin: 4px; */
        background-color: blueviolet;
        flex-flow: 1;
      }

      .item1 {
        /* flex-grow: 2; */
        flex-shrink: 2;
        align-self: flex-end;
      }

      .item2 {
        /* flex-grow: 2; */
        flex-shrink: 2;
        align-self: flex-start;
      }

      .order-1 {
        order: 1;
      }
      .order-2 {
        order: 2;
      }
      .order-3 {
        order: 3;
      }
      .order-4 {
        order: 4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item order-1 item1">1</div>
      <div class="item order-2">2</div>
      <div class="item item2">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
      <div class="item">6</div>
    </div>
  </body>
</html>
