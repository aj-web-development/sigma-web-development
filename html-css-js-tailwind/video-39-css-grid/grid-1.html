<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid</title>
    <style>
      .container {
        border: 2px solid black;
        display: grid;
        /* grid-template-columns: 120px 100px; */
        /* Custom Names to cols */
        grid-template-columns: [pahela] 120px [dusra] 100px [t];
        grid-template-rows: 100px 100px 100px;
      }

      .item {
        border: 2px solid red;
        width: 45px;
        height: 45px;
      }
      .item4 {
        grid-row: 1/2;
        /* grid-column: 1/2; */
        /* grid-column: dusra/t; */
        grid-column: pahela/t;
      }

      .item1 {
        /* grid-row: 1/2; */
        /* below two grid-row-* Same as above */
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column: 1/2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item item4">4</div>
      <div class="item">5</div>
    </div>
  </body>
</html>
